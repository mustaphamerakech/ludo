<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro 1vs1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #00d2ff; --green: #91ff00; --red: #ff416c; --yellow: #ffb75e; --bg: #0f2027; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        
        #game-header { text-align: center; margin: 15px; }
        #status-bar { font-size: 14px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; }

        #board { 
            width: 360px; height: 360px; background: rgba(255, 255, 255, 0.05); position: relative; 
            border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .case { 
            position: absolute; width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; font-size: 8px; border-radius: 4px;
        }
        .safe { background: rgba(255, 215, 0, 0.3); border: 1px solid gold; }

        .pion { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid white; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            z-index: 100; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .can-move { animation: pulse 0.8s infinite; border: 3px solid #fff; scale: 1.2; z-index: 101; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255,255,255,0.7); } 100% { box-shadow: 0 0 0 15px rgba(255,255,255,0); } }

        .power-icon { position: absolute; font-size: 16px; pointer-events: none; z-index: 10; }

        #ui-panel { width: 360px; margin-top: 20px; text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; }
        .dice-box { font-size: 40px; margin: 10px; cursor: pointer; display: inline-block; transition: 0.3s; }
        .dice-box:active { transform: scale(0.8) rotate(15deg); }
        .btn { padding: 8px 15px; border: none; border-radius: 10px; background: var(--blue); color: white; cursor: pointer; }
        
        .base-p1, .base-p2 { position: absolute; width: 60px; height: 60px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px; }
        .base-p1 { left: 10px; top: 150px; } .base-p2 { right: 10px; top: 150px; }
    </style>
</head>
<body>

    <div id="game-header">
        <h2>LUDO MINI 1VS1</h2>
        <div id="status-bar">Attente de connexion...</div>
        <div id="conn-controls">
            <input type="text" id="target-id" style="padding:5px; border-radius:5px;" placeholder="ID de l'ami">
            <button class="btn" onclick="joinGame()">Connecter</button>
            <p style="font-size: 10px; opacity: 0.6; margin-top:5px;">Ton ID: <span id="my-peer-id">...</span></p>
        </div>
    </div>

    <div id="board">
        <div class="base-p1" title="Base Bleu"></div>
        <div class="base-p2" title="Base Vert"></div>
        </div>

    <div id="ui-panel">
        <div id="score-text">P1: 0 | P2: 0</div>
        <div id="dice-container" class="dice-box" onclick="rollDice()">🎲</div>
        <p id="instruction">Appuie sur le dé</p>
        <div id="active-power" style="font-size: 12px; color: var(--yellow);"></div>
    </div>

<script>
    let peer, conn, myRole;
    let currentDice = 0;
    const CASE_S = 32;
    
    // Chemin simplifié (Le plateau est une boucle de 24 cases)
    const pathCoords = [];
    for(let i=0; i<10; i++) pathCoords.push({x: 20 + i*CASE_S, y: 120}); // Aller
    for(let i=0; i<4; i++) pathCoords.push({x: 308, y: 152 + i*CASE_S}); // Virage
    for(let i=0; i<10; i++) pathCoords.push({x: 308 - i*CASE_S, y: 280}); // Retour

    let state = {
        turn: 1,
        p1: { pions: [-1, -1, 0, 0], score: 0, power: null }, // -1 = Base, 0+ = Sur circuit
        p2: { pions: [-1, -1, 0, 0], score: 0, power: null },
        powers: [{p: 5, t: '🛡️'}, {p: 12, t: '🚀'}, {p: 18, t: '🎯'}],
        lastDice: 0
    };

    peer = new Peer();
    peer.on('open', id => document.getElementById('my-peer-id').innerText = id);
    peer.on('connection', c => { conn = c; myRole = 1; initGame(); });

    function joinGame() {
        const id = document.getElementById('target-id').value;
        conn = peer.connect(id);
        myRole = 2;
        initGame();
    }

    function initGame() {
        document.getElementById('conn-controls').style.display = 'none';
        document.getElementById('status-bar').innerText = "Connecté ! Bonne chance.";
        conn.on('data', d => { state = d; updateUI(); });
        
        // Générer les cases visuelles
        const b = document.getElementById('board');
        pathCoords.forEach((pos, i) => {
            const div = document.createElement('div');
            div.className = 'case' + ([0, 6, 12, 18].includes(i) ? ' safe' : '');
            div.style.left = pos.x + 'px'; div.style.top = pos.y + 'px';
            b.appendChild(div);
        });

        // Créer les pions
        for(let i=0; i<4; i++) {
            createPion('p1', i, 'var(--blue)');
            createPion('p2', i, 'var(--green)');
        }
        updateUI();
    }

    function createPion(p, i, color) {
        const div = document.createElement('div');
        div.id = `${p}-${i}`;
        div.className = 'pion';
        div.style.background = color;
        div.onclick = () => moveSelectedPion(i);
        document.getElementById('board').appendChild(div);
    }

    function rollDice() {
        if (state.turn !== myRole || currentDice !== 0) return;
        
        let d = Math.floor(Math.random() * 6) + 1;
        
        // Appliquer pouvoirs
        let pData = state[`p${myRole}`];
        if(pData.power === '🎯') d = 6; // Force un 6
        if(pData.power === '🚀') d = d + 2; // Bonus de vitesse

        currentDice = d;
        state.lastDice = d;
        document.getElementById('dice-container').innerText = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"][d] || d;
        
        // Vérifier si au moins un pion peut bouger
        const canMove = pData.pions.some(p => p !== -1 || d === 6);
        if(!canMove) {
            setTimeout(nextTurn, 1000);
        } else {
            document.getElementById('instruction').innerText = "Choisis un pion brillant !";
            updateUI();
        }
    }

    function moveSelectedPion(idx) {
        if (state.turn !== myRole || currentDice === 0) return;
        
        let pData = state[`p${myRole}`];
        let pos = pData.pions[idx];

        // Sortie de base
        if (pos === -1) {
            if (currentDice === 6) {
                pData.pions[idx] = 0;
                finishMove();
            }
        } else {
            // Avancer
            pData.pions[idx] += currentDice;
            checkLogic(idx);
            finishMove();
        }
    }

    function checkLogic(idx) {
        let pData = state[`p${myRole}`];
        let opData = state[`p${myRole === 1 ? 2 : 1}`];
        let newPos = pData.pions[idx];

        // 1. Victoire
        if (newPos >= pathCoords.length) {
            pData.score++;
            pData.pions[idx] = -2; // Hors jeu
            alert("Pion arrivé !");
        }

        // 2. Pouvoir
        let pw = state.powers.find(x => x.p === newPos);
        if(pw) {
            pData.power = pw.t;
            pw.p = Math.floor(Math.random() * 20); // Déplace le bonus
        }

        // 3. Manger l'adversaire
        opData.pions.forEach((oPos, i) => {
            if(oPos === newPos && ![0, 6, 12, 18].includes(newPos)) {
                if(pData.power !== '🛡️') {
                    opData.pions[i] = -1;
                    pData.score++;
                    alert("MANGÉ ! +1 Point");
                }
            }
        });
        
        if(pData.power === '🛡️') pData.power = null;
    }

    function finishMove() {
        if (currentDice !== 6) nextTurn();
        currentDice = 0;
        sync();
    }

    function nextTurn() {
        state.turn = state.turn === 1 ? 2 : 1;
        currentDice = 0;
        document.getElementById('instruction').innerText = "Au tour de l'adversaire";
        sync();
    }

    function sync() {
        if(conn) conn.send(state);
        updateUI();
    }

    function updateUI() {
        // Positionner les pions
        ['p1', 'p2'].forEach(pKey => {
            state[pKey].pions.forEach((pos, i) => {
                const el = document.getElementById(`${pKey}-${i}`);
                if(pos === -1) { // Base
                    el.style.left = (pKey === 'p1' ? 20 : 310) + 'px';
                    el.style.top = (155 + i*10) + 'px';
                } else if(pos === -2) {
                    el.style.display = 'none';
                } else {
                    el.style.left = pathCoords[pos].x + 4 + 'px';
                    el.style.top = pathCoords[pos].y + 4 + 'px';
                }
                
                // Animation de sélection
                const isMyTurn = (state.turn === myRole && pKey === `p${myRole}`);
                const canExit = (pos === -1 && currentDice === 6);
                const canMove = (pos >= 0 && currentDice > 0);
                el.classList.toggle('can-move', isMyTurn && (canExit || canMove));
            });
        });

        document.getElementById('score-text').innerText = `P1: ${state.p1.score} | P2: ${state.p2.score}`;
        document.getElementById('active-power').innerText = "Mon Pouvoir: " + (state[`p${myRole}`]?.power || "Aucun");
    }
</script>
</body>
</html>
